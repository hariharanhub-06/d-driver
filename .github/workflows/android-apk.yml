name: Build Onlive Android APK (Capacitor)

# Builds an installable debug APK in the cloud (no local Android SDK needed).
# Run automatically on changes to the shell, or manually from the Actions tab.
on:
  push:
    paths:
      - 'capacitor-shell/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: capacitor-shell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm install

      # Copy the latest web assets/config into the (already-committed) Android
      # project. `copy` is lightweight and won't fail the way full `sync` did.
      - name: Capacitor copy
        run: npx cap copy android || true

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          set +e
          ./gradlew assembleDebug --no-daemon --stacktrace > build.log 2>&1
          rc=$?
          echo "----- gradle tail -----"; tail -50 build.log
          if [ "$rc" != "0" ]; then
            grep -niE "FAILURE:|What went wrong|Caused by:|error:|Could not|not found|Unsupported|requires|Exception|^> " build.log | tail -12 | while IFS= read -r l; do echo "::error::${l}"; done
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: onlive-android-apk
          path: capacitor-shell/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
