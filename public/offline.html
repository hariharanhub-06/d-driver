<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D-Driver — Offline</title>
  <style>
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0f172a;color:#e2e8f0}
    .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
    .dot{width:64px;height:64px;border-radius:20px;background:#2dbc75;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
    h1{font-size:20px;margin:0 0 8px}
    p{color:#94a3b8;font-size:14px;max-width:300px;line-height:1.5}
    button{margin-top:20px;background:#2dbc75;color:#06281a;border:0;font-weight:700;padding:12px 24px;border-radius:12px;font-size:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="dot">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#06281a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.5 6 18.5 6H4c-1.1 0-2 .9-2 2v10h3"/><circle cx="7" cy="18" r="2"/><circle cx="16" cy="18" r="2"/></svg>
    </div>
    <h1>You're offline</h1>
    <p>D-Driver needs a connection for live bus tracking. Your last loaded screen may still be available — reconnect to get live updates.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
