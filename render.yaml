services:
  - type: web
    name: d-driver-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma db push --accept-data-loss && npm run seed
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://d-driver.vercel.app
      - key: SA_EMAIL
        sync: false
      - key: SA_PASSWORD
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        value: public_z27Z1/hVaSHjsLuCBbPABzR/i4M=
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        value: https://ik.imagekit.io/zr66xdfcs
      - key: RESEND_FROM_DEFAULT
        value: noreply@onlive.co.in
      - key: RESEND_API_KEY
        sync: false
      - key: BASE_DOMAIN
        sync: false
      # Razorpay — PLATFORM account (schools paying their platform/subscription invoices).
      # Schools collecting transport fees from parents use their OWN keys, entered in-app and
      # stored encrypted; those never come from here.
      # These are fallbacks: keys saved via Super Admin → Settings take precedence.
      # sync:false = set the value in the Render dashboard, never commit it.
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      # Set this to the signing secret shown when you create the webhook in the Razorpay
      # dashboard (it is NOT the API key secret). Webhook endpoint:
      #   POST https://<backend-host>/api/v1/billing/webhook   event: payment.captured
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
