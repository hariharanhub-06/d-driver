services:
  - type: web
    name: d-driver-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma db push --accept-data-loss
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://d-driver.vercel.app
      - key: SA_EMAIL
        sync: false
      - key: SA_PASSWORD
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        value: public_z27Z1/hVaSHjsLuCBbPABzR/i4M=
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        value: https://ik.imagekit.io/zr66xdfcs
      - key: RESEND_FROM_DEFAULT
        value: noreply@ddriver.app
      - key: RESEND_API_KEY
        sync: false
      - key: BASE_DOMAIN
        sync: false
